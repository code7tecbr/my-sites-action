name: 'my-sites Deploy'
description: 'Clona o template my-sites, injeta content/ e public/ e faz deploy no Cloudflare via Alchemy'

inputs:
  app_name:
    description: 'Nome único do app no Cloudflare (ex: acme-site, banda-fulana)'
    required: true
  cf_api_token:
    description: 'Cloudflare API Token com permissão de Workers e Pages'
    required: true
  cf_account_id:
    description: 'Cloudflare Account ID'
    required: true
  template_token:
    description: 'GitHub PAT (read-only) para clonar o repo privado code7tecbr/my-sites'
    required: true
  stage:
    description: 'Stage do Alchemy (ex: prod, staging). Afeta o nome do Worker no Cloudflare.'
    required: false
    default: 'prod'
  custom_domains:
    description: 'Domínios customizados separados por vírgula (ex: site.com.br,www.site.com.br)'
    required: false
    default: ''
  alchemy_password:
    description: 'Senha para criptografia do state store do Alchemy (ALCHEMY_PASSWORD)'
    required: true
  repo_template:
    description: 'repositório template para deploy (ex: code7tecbr/my-sites)'
    required: false
    default: 'code7tecbr/my-sites'

runs:
  using: 'composite'
  steps:
    - name: Clonar template my-sites
      shell: bash
      run: |
        git \
          -c credential.helper= \
          -c http.https://github.com/.extraheader= \
          clone https://x-access-token:${{ inputs.template_token }}@github.com/${{ inputs.repo_template }}.git \
          ${{ runner.temp }}/my-sites-template

    - name: Injetar content/ do cliente
      shell: bash
      run: |
        rm -rf ${{ runner.temp }}/my-sites-template/content
        cp -r $GITHUB_WORKSPACE/content ${{ runner.temp }}/my-sites-template/content

    - name: Injetar public/ do cliente (se existir)
      shell: bash
      run: |
        if [ -d "$GITHUB_WORKSPACE/public" ]; then
          rm -rf ${{ runner.temp }}/my-sites-template/public
          cp -r $GITHUB_WORKSPACE/public ${{ runner.temp }}/my-sites-template/public
        fi

    - name: Restaurar state do Alchemy (.alchemy/)
      shell: bash
      run: |
        if [ -d "$GITHUB_WORKSPACE/.alchemy" ]; then
          rm -rf ${{ runner.temp }}/my-sites-template/.alchemy
          cp -r $GITHUB_WORKSPACE/.alchemy ${{ runner.temp }}/my-sites-template/.alchemy
        fi

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    - name: Instalar dependências
      shell: bash
      working-directory: ${{ runner.temp }}/my-sites-template
      run: bun install --frozen-lockfile

    - name: Gerar tipos Nuxt
      shell: bash
      working-directory: ${{ runner.temp }}/my-sites-template
      run: bun nuxt prepare

    - name: Deploy via Alchemy
      shell: bash
      working-directory: ${{ runner.temp }}/my-sites-template
      run: bunx alchemy deploy --adopt
      env:
        APP_NAME: ${{ inputs.app_name }}
        CLOUDFLARE_API_TOKEN: ${{ inputs.cf_api_token }}
        CLOUDFLARE_ACCOUNT_ID: ${{ inputs.cf_account_id }}
        ALCHEMY_STAGE: ${{ inputs.stage }}
        CUSTOM_DOMAINS: ${{ inputs.custom_domains }}
        ALCHEMY_CI_STATE_STORE_CHECK: false
        ALCHEMY_PASSWORD: ${{ inputs.alchemy_password }}

    - name: Persistir state do Alchemy no repo de conteúdo
      shell: bash
      run: |
        find ${{ runner.temp }}/my-sites-template/.alchemy -name '*-build.json' -delete
        cd $GITHUB_WORKSPACE
        cp -r ${{ runner.temp }}/my-sites-template/.alchemy .alchemy
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git remote set-url origin https://x-access-token:$GITHUB_TOKEN@github.com/$GITHUB_REPOSITORY.git
        git add .alchemy
        if [ "${{ inputs.repo_template }}" != "code7tecbr/my-sites" ]; then
          cp -r ${{ runner.temp }}/my-sites-template/.nuxt .nuxt
          git add .nuxt
        fi
        git diff --staged --quiet || git commit -m "chore: atualiza state do Alchemy [skip ci]"
        git push
